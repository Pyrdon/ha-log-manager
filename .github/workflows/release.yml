name: Automated Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository.
        uses: actions/checkout@v4
        
      - name: Create GitHub Release.
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: true
