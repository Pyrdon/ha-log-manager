name: Automated Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required to fetch the full commit history
        
      - name: Build Changelog from Commits
        id: build_changelog
        uses: mikepenz/release-changelog-builder-action@v5
        with:
          mode: "COMMIT"
          configurationJson: |
            {
              "categories": [
                { "title": "🚀 Features", "labels": ["feat", "perf"] },
                { "title": "🐛 Bug Fixes", "labels": ["fix"] },
                { "title": "📚 Documentation", "labels": ["docs"] },
                { "title": "🧰 Maintenance", "labels": ["chore", "refactor", "style", "test"] }
              ],
              "template": "# Release Notes\n\n#{{UNCATEGORIZED}}\n",
              "pr_template": "- #{{TITLE}} (#{{HASH}})"
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
      - name: Create Draft GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.build_changelog.outputs.changelog }}
          draft: true
